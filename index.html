<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="description" content="Portfolio of Baran Çakı - AI Engineer & Automation Architect" />
  <title>Baran Çakı | AI Engineer</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            void: '#0a0a0a',
            neon: '#7c3aed',
            cyan: '#06b6d4',
            surface: 'rgba(10, 10, 10, 0.5)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          animation: {
            'blob': 'blob 7s infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'marquee': 'marquee 25s linear infinite',
            'marquee2': 'marquee2 25s linear infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            marquee: {
              '0%': { transform: 'translateX(0%)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            marquee2: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(0%)' },
            }
          }
        }
      }
    }
  </script>
  <script>
    // Check for saved theme preference or default to Dark
    // Logic: If explicitly 'light', be light. Otherwise (undefined or 'dark'), be dark.
    if (localStorage.theme === 'light') {
      document.documentElement.classList.remove('dark')
    } else {
      document.documentElement.classList.add('dark')
      // Optional: Set formatting to match system if meaningful, but we default to dark.
    }
  </script>
  <style>
    /* Dark Mode (Class-based) - Applied when .dark is present */
    html.dark body {
      background-color: #0a0a0a;
      color: white;
    }

    html.dark .glass-card {
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html.dark .glass-card:hover {
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: 0 0 30px -5px rgba(6, 182, 212, 0.15);
    }

    /* Light Mode (Default/Fallback) */
    body {
      background-color: #f8fafc;
      color: #0f172a;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(124, 58, 237, 0.3);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    /* Text overrides for Light Mode */
    html:not(.dark) .text-gray-400 {
      color: #475569 !important;
    }

    html:not(.dark) .text-gray-300 {
      color: #334155 !important;
    }

    html:not(.dark) .text-gray-500 {
      color: #64748b !important;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
    }

    /* Light Mode Scrollbar */
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Dark Mode Scrollbar */
    html.dark ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #333;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>

</head>

</html>
